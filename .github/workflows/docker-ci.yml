name: Docker CI - scan and release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PLATFORMS: linux/amd64,linux/arm64
  SCANNER_IMAGE: aquasec/trivy:0.70.0

jobs:
  security-check:
    name: Build temporary images and scan CVE
    runs-on: ubuntu-latest

    steps:
      - name: Get repository sources
        uses: actions/checkout@v6

      - name: Define registry references
        id: refs
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Missing repository variable: DOCKERHUB_USERNAME"
            exit 1
          fi

          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "cache=docker.io/${DOCKERHUB_USERNAME,,}/zadanie2-cache" >> "$GITHUB_OUTPUT"

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v4

      - name: Prepare Docker Buildx builder
        uses: docker/setup-buildx-action@v4

      - name: Sign in to DockerHub cache registry
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build amd64 image as tar file
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/pawcho-task2-amd64.tar
          cache-from: type=registry,ref=${{ steps.refs.outputs.cache }}:cache-amd64
          cache-to: type=registry,ref=${{ steps.refs.outputs.cache }}:cache-amd64,mode=max

      - name: Scan amd64 image for HIGH and CRITICAL CVE
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .trivy-cache
          docker run --rm \
            -v /tmp:/tmp \
            -v "$PWD/.trivy-cache:/root/.cache/" \
            "$SCANNER_IMAGE" image \
            --input /tmp/pawcho-task2-amd64.tar \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --scanners vuln

      - name: Build arm64 image as tar file
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/pawcho-task2-arm64.tar
          cache-from: type=registry,ref=${{ steps.refs.outputs.cache }}:cache-arm64
          cache-to: type=registry,ref=${{ steps.refs.outputs.cache }}:cache-arm64,mode=max

      - name: Scan arm64 image for HIGH and CRITICAL CVE
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .trivy-cache
          docker run --rm \
            -v /tmp:/tmp \
            -v "$PWD/.trivy-cache:/root/.cache/" \
            "$SCANNER_IMAGE" image \
            --input /tmp/pawcho-task2-arm64.tar \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --scanners vuln

  release-image:
    name: Publish image to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: security-check

    steps:
      - name: Get repository sources
        uses: actions/checkout@v6

      - name: Define registry references
        id: refs
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Missing repository variable: DOCKERHUB_USERNAME"
            exit 1
          fi

          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "cache=docker.io/${DOCKERHUB_USERNAME,,}/zadanie2-cache" >> "$GITHUB_OUTPUT"

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v4

      - name: Prepare Docker Buildx builder
        uses: docker/setup-buildx-action@v4

      - name: Sign in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign in to DockerHub cache registry
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.refs.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=sha,format=short,prefix=commit-,priority=700
            type=semver,pattern={{version}},priority=900
            type=semver,pattern={{major}}.{{minor}},priority=800

      - name: Build and push multi-architecture image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ steps.refs.outputs.cache }}:cache-amd64
            type=registry,ref=${{ steps.refs.outputs.cache }}:cache-arm64
            type=registry,ref=${{ steps.refs.outputs.cache }}:cache-release
          cache-to: type=registry,ref=${{ steps.refs.outputs.cache }}:cache-release,mode=max
